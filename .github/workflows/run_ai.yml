ame: AI Video Maker
on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated to v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: |
          pip install openai moviepy

      - name: Run Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main.py

      - name: Save Video
        uses: actions/upload-artifact@v4 # Ye v3 tha, ab v4 kar diya hai
        with:
          name: daily-ad-video
          path: daily_ad.mp4
